<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENDER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: linear-gradient(145deg, #353535, #616161);
            border: 1px solid rgba(70, 70, 70, 0.808);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 520px;
        }
        .card-header { text-align: center; }
        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.04em;
        }
        .card-header p {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }
        #canvas-container {
            width: 460px;
            height: 360px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
            background: #0a0a14;
        }
        #canvas-container canvas { display: block; }
        .badge {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .badge span {
            font-size: 0.72rem;
            padding: 4px 12px;
            border-radius: 20px;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>Cubo Interactivo</h1>
            <p>Arrastra para rotar · Scroll para hacer zoom</p>
        </div>
        <div id="canvas-container"></div>
        <div class="badge">
            <span>🔴 Rojo</span>
            <span>🟠 Naranja</span>
            <span>🟡 Amarillo</span>
            <span>🟢 Verde</span>
            <span>🔵 Azul</span>
            <span>🟣 Morado</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const W = container.clientWidth;
        const H = container.clientHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 1000);
        camera.position.z = 2.8;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(W, H);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Cubo con un color diferente por cara
        const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const materials = [
            new THREE.MeshStandardMaterial({ color: 0xe74c3c }), // derecha   – rojo
            new THREE.MeshStandardMaterial({ color: 0xe67e22 }), // izquierda – naranja
            new THREE.MeshStandardMaterial({ color: 0xf1c40f }), // arriba    – amarillo
            new THREE.MeshStandardMaterial({ color: 0x2ecc71 }), // abajo     – verde
            new THREE.MeshStandardMaterial({ color: 0x3498db }), // frente    – azul
            new THREE.MeshStandardMaterial({ color: 0x9b59b6 }), // atrás     – morado
        ];
        const cube = new THREE.Mesh(geometry, materials);
        scene.add(cube);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(3, 4, 5);
        scene.add(dirLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.y += 0.005;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
